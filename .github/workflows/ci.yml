name: Run Tests and Linting

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 3. Тестирование на разных версиях Python (Matrix Strategy)
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          # Используем версию из матрицы
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. Добавляем flake8 вместе с pytest
          pip install pytest flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 1. Запуск линтера (Flake8)
      - name: Lint with flake8
        run: |
          # E9,F63,F7,F82 - это критические ошибки синтаксиса
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Остальные ошибки (стиль кода)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Tests
        run: |
          pytest

      # 2. Уведомление в Telegram при ошибке
      - name: Send Telegram Notification
        if: failure() # Выполнить только если предыдущие шаги упали
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚨 Ошибка в CI/CD пайплайне!
            Репозиторий: ${{ github.repository }}
            Версия Python: ${{ matrix.python-version }}
            Коммит: ${{ github.sha }}
            Автор: ${{ github.actor }}
            Посмотреть: https://github.com/${{ github.repository }}/actions
